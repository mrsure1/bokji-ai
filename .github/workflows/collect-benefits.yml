name: 복지 데이터 매일 수집

on:
  schedule:
    # 매일 02:30 KST (17:30 UTC) — 새벽에 1회 수집
    - cron: "30 17 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

# 이전 실행이 끝나기 전에 또 트리거되면 겹치지 않게 한다 (무료 러너 부담↓)
concurrency:
  group: collect-benefits
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ 는 내장 WebSocket 지원 (@supabase/supabase-js 요구사항)
          node-version: "22"
          cache: "npm"

      # 수집 스크립트는 @supabase/supabase-js만 필요 → 운영 의존성만 설치(빠름, playwright 등 제외)
      - run: npm ci --omit=dev

      - name: 복지로 + 정부24 수집 → Supabase
        run: npm run collect-benefits:direct
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          GOV24_SERVICE_KEY: ${{ secrets.GOV24_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 신규/미임베딩 혜택만 벡터 임베딩 생성(증분) → pgvector 의미검색 최신 유지
      - name: 신규 혜택 임베딩 → benefit_embeddings
        run: npm run embed-benefits
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_EMBEDDING_MODEL: ${{ secrets.GEMINI_EMBEDDING_MODEL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

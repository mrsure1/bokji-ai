name: 복지 데이터 매일 수집

on:
  schedule:
    # 매일 02:30 KST (17:30 UTC) — 새벽에 1회 수집
    - cron: "30 17 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 수집 스크립트는 @supabase/supabase-js만 필요 → 운영 의존성만 설치(빠름, playwright 등 제외)
      - run: npm ci --omit=dev

      - name: 복지로 + 정부24 수집 → Supabase
        run: npm run collect-benefits:direct
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          GOV24_SERVICE_KEY: ${{ secrets.GOV24_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
